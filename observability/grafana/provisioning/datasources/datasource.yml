apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 10s

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://traces:16686
    editable: true
