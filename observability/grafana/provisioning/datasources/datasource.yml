apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 10s

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "\"trace_id\":\"([0-9a-f]+)\""
          name: trace_id
          url: "$${__value.raw}"

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://traces:16686
    editable: true
