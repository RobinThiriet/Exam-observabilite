[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

    storage.path              /fluent-bit/state/storage
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 50M

[INPUT]
    Name              tail
    Path              /logs/*.log
    Parser            python_app
    Tag               app.logs
    Path_Key          file_path
    DB                /fluent-bit/state/app-logs.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Rotate_Wait       30
    Read_from_Head    On

[FILTER]
    Name          parser
    Match         app.logs
    Key_Name      file_path
    Parser        log_path
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name          parser
    Match         app.logs
    Key_Name      message
    Parser        reservation_id
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name  modify
    Match app.logs
    Add   stack grafana-loki-jaeger-prometheus
    Add   environment tp-observability
    Add   log_source application-file

[OUTPUT]
    Name                loki
    Match               app.logs
    Host                loki
    Port                3100
    Labels              job=restaurant,service=$service_name,level=$level
    Structured_Metadata reservation_id=$reservation_id,trace_id=$trace_id,span_id=$span_id
    Line_Format         json
    Retry_Limit         False
